[pytest]
DJANGO_SETTINGS_MODULE = config.settings.testing
python_files = tests/test_*.py tests/**/test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --tb=short
    -q
markers =
    unit: Unit tests
    integration: Integration tests
    api: API endpoint tests
    slow: Slow tests
