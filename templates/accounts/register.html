{% extends "base.html" %}
{% block public_content %}
<div class="min-h-screen bg-surface flex items-center justify-center p-4">
  <div class="absolute inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary-600/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-600/10 rounded-full blur-3xl"></div>
  </div>

  <div class="w-full max-w-md relative z-10 animate-slide-up">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-primary-600 rounded-2xl mb-4 shadow-lg shadow-primary-600/30">
        <i data-lucide="book-open" class="w-8 h-8 text-white"></i>
      </div>
      <h1 class="text-3xl font-bold text-white">Lexora Library</h1>
      <p class="text-gray-400 mt-2">Crea tu cuenta de membresía</p>
    </div>

    <div class="glass rounded-2xl p-8">
      <h2 class="text-xl font-semibold text-white mb-6">Crear cuenta</h2>

      <form method="post" action="{% url 'accounts:register' %}" class="space-y-4">
        {% csrf_token %}

        {% if form.non_field_errors %}
        <div class="p-3 bg-red-500/10 border border-red-500/30 rounded-lg">
          {% for error in form.non_field_errors %}<p class="text-sm text-red-400">{{ error }}</p>{% endfor %}
        </div>
        {% endif %}

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Nombre</label>
            <input type="text" name="first_name" class="w-full bg-surface border border-surface-border rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-primary-500 transition-colors" placeholder="Carlos" required>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-300 mb-2">Apellido</label>
            <input type="text" name="last_name" class="w-full bg-surface border border-surface-border rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-primary-500 transition-colors" placeholder="García" required>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Correo electrónico</label>
          <input type="email" name="email" class="w-full bg-surface border border-surface-border rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-primary-500 transition-colors" placeholder="carlos@email.com" required>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Nombre de usuario</label>
          <input type="text" name="username" class="w-full bg-surface border border-surface-border rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-primary-500 transition-colors" placeholder="carlosg" required>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Contraseña</label>
          <input type="password" name="password" class="w-full bg-surface border border-surface-border rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-primary-500 transition-colors" placeholder="Mínimo 8 caracteres" required minlength="8">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-300 mb-2">Confirmar contraseña</label>
          <input type="password" name="password_confirm" class="w-full bg-surface border border-surface-border rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-primary-500 transition-colors" placeholder="••••••••" required>
        </div>

        <button type="submit" class="w-full bg-primary-600 hover:bg-primary-500 text-white font-semibold py-3 rounded-xl transition-all duration-200 shadow-lg shadow-primary-600/30 mt-2">
          Crear cuenta
        </button>
      </form>

      <p class="text-center text-gray-500 text-sm mt-6">
        ¿Ya tienes cuenta?
        <a href="{% url 'accounts:login' %}" class="text-primary-400 hover:text-primary-300 font-medium transition-colors">Inicia sesión</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
